version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: meatnspice-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meatnspice
    ports:
      - "5432:5432"
    volumes:
      - meatnspice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meatnspice"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meatnspice_pgdata:
